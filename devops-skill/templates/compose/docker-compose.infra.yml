# ============================================
# DevOps Infrastructure Docker Compose
# Jenkins + SonarQube + Registry + Nexus
# ============================================

services:
  # === Jenkins CI/CD ===
  jenkins:
    image: jenkins/jenkins:lts
    container_name: jenkins
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker:ro
      - /usr/libexec/docker/cli-plugins:/usr/libexec/docker/cli-plugins:ro
      # Mount project root for local builds (adjust path as needed)
      # - ${PROJECT_ROOT:-/home/user/project}:${PROJECT_ROOT:-/home/user/project}
    environment:
      - JAVA_OPTS=-Xmx2g -Xms512m
      - DOCKER_HOST=unix:///var/run/docker.sock
    # Add jenkins user to host docker group for socket access
    # Find GID with: stat -c '%g' /var/run/docker.sock
    group_add:
      - "${DOCKER_GID:-999}"  # host docker group GID
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/login"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    networks:
      - devops-net

  # === SonarQube Code Quality ===
  sonarqube:
    image: sonarqube:community
    container_name: sonarqube
    restart: unless-stopped
    depends_on:
      sonarqube-db:
        condition: service_healthy
    ports:
      - "9000:9000"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
      - sonarqube_extensions:/opt/sonarqube/extensions
    environment:
      - SONAR_JDBC_URL=jdbc:postgresql://sonarqube-db:5432/sonarqube
      - SONAR_JDBC_USERNAME=${SONAR_DB_USER:-sonarqube}
      - SONAR_JDBC_PASSWORD=${SONAR_DB_PASSWORD:-sonarqube}
      - SONAR_ES_BOOTSTRAP_CHECKS_DISABLE=true
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/api/system/status | grep -q UP"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    networks:
      - devops-net

  sonarqube-db:
    image: postgres:16-alpine
    container_name: sonarqube-db
    restart: unless-stopped
    volumes:
      - sonarqube_db_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${SONAR_DB_USER:-sonarqube}
      - POSTGRES_PASSWORD=${SONAR_DB_PASSWORD:-sonarqube}
      - POSTGRES_DB=sonarqube
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonarqube"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - devops-net

  # === Docker Registry ===
  registry:
    image: registry:2
    container_name: registry
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - registry_data:/var/lib/registry
    environment:
      - REGISTRY_STORAGE_DELETE_ENABLED=true
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/v2/"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - devops-net

  # === Nexus Repository (Optional) ===
  # Uncomment to enable Maven/npm private repository
  # nexus:
  #   image: sonatype/nexus3
  #   container_name: nexus
  #   restart: unless-stopped
  #   ports:
  #     - "8081:8081"
  #   volumes:
  #     - nexus_data:/nexus-data
  #   environment:
  #     - INSTALL4J_ADD_VM_PARAMS=-Xms512m -Xmx2g
  #   healthcheck:
  #     test: ["CMD", "curl", "-f", "http://localhost:8081/service/rest/v1/status"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 10
  #     start_period: 120s
  #   networks:
  #     - devops-net

volumes:
  jenkins_home:
  sonarqube_data:
  sonarqube_logs:
  sonarqube_extensions:
  sonarqube_db_data:
  registry_data:
  # nexus_data:

networks:
  devops-net:
    driver: bridge
