# K8s Secret - DevOps Skill Template
# ============================================
# 🔴 CRITICAL: This is a TEMPLATE ONLY
# Do NOT commit actual secrets to version control!
# Use:
#   - kubectl create secret generic
#   - External Secrets Operator
#   - HashiCorp Vault
#   - Sealed Secrets
# ============================================
apiVersion: v1
kind: Secret
metadata:
  name: {{PROJECT_NAME}}-secret
  namespace: {{NAMESPACE}}
  labels:
    app: {{PROJECT_NAME}}
    app.kubernetes.io/managed-by: devops-skill
type: Opaque
data:
  # Base64 encoded values (example placeholders)
  # echo -n 'value' | base64
  DATABASE_URL: "{{BASE64_DATABASE_URL}}"
  API_KEY: "{{BASE64_API_KEY}}"
