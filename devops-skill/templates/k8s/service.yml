# K8s Service - DevOps Skill Template
apiVersion: v1
kind: Service
metadata:
  name: {{PROJECT_NAME}}
  namespace: {{NAMESPACE}}
  labels:
    app: {{PROJECT_NAME}}
    app.kubernetes.io/name: {{PROJECT_NAME}}
    app.kubernetes.io/managed-by: devops-skill
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
  selector:
    app: {{PROJECT_NAME}}
