# K8s ConfigMap - DevOps Skill Template
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{PROJECT_NAME}}-config
  namespace: {{NAMESPACE}}
  labels:
    app: {{PROJECT_NAME}}
    app.kubernetes.io/managed-by: devops-skill
data:
  # Application configuration (non-sensitive)
  APP_ENV: "{{ENVIRONMENT}}"
  APP_PORT: "{{APP_PORT}}"
  LOG_LEVEL: "info"
  # Add your configuration here
