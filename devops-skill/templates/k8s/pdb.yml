# K8s PodDisruptionBudget - DevOps Skill Template
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{PROJECT_NAME}}
  namespace: {{NAMESPACE}}
  labels:
    app: {{PROJECT_NAME}}
    app.kubernetes.io/managed-by: devops-skill
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: {{PROJECT_NAME}}
