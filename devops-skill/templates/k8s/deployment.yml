# K8s Deployment - DevOps Skill Template
# Placeholder convention: {{VAR}} = replaced at generation time (not runtime).
# Use `envsubst` or `sed` to substitute before `kubectl apply`.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{PROJECT_NAME}}
  namespace: {{NAMESPACE}}
  labels:
    app: {{PROJECT_NAME}}
    version: "{{VERSION}}"
    app.kubernetes.io/name: {{PROJECT_NAME}}
    app.kubernetes.io/version: "{{VERSION}}"
    app.kubernetes.io/managed-by: devops-skill
spec:
  replicas: {{REPLICAS}}
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: {{PROJECT_NAME}}
  template:
    metadata:
      labels:
        app: {{PROJECT_NAME}}
        version: "{{VERSION}}"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{APP_PORT}}"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: {{PROJECT_NAME}}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: {{PROJECT_NAME}}
          image: {{REGISTRY}}/{{PROJECT_NAME}}:{{VERSION}}
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: {{APP_PORT}}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{PROJECT_NAME}}-config
            - secretRef:
                name: {{PROJECT_NAME}}-secret
          # 🔴 C3: Health checks required
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 30
          # 🔴 C5: Resource limits required
          resources:
            requests:
              cpu: {{CPU_REQUEST}}
              memory: {{MEMORY_REQUEST}}
            limits:
              cpu: {{CPU_LIMIT}}
              memory: {{MEMORY_LIMIT}}
      terminationGracePeriodSeconds: 30
