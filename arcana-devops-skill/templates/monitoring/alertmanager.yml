# ============================================
# AlertManager Configuration
# DevOps Skill Template
# ============================================

global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'service']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'default'
  routes:
    - match:
        severity: critical
      receiver: 'critical'
      group_wait: 10s
      repeat_interval: 1h
    - match:
        severity: warning
      receiver: 'warning'
      repeat_interval: 4h

receivers:
  - name: 'default'
    # Configure your notification channel
    # webhook_configs:
    #   - url: 'http://your-webhook-url'

  - name: 'critical'
    # Slack example (uncomment and configure)
    # slack_configs:
    #   - api_url: '{{SLACK_WEBHOOK_URL}}'
    #     channel: '#alerts-critical'
    #     title: '🔴 CRITICAL: {{ .GroupLabels.alertname }}'
    #     text: '{{ range .Alerts }}{{ .Annotations.summary }}\n{{ end }}'
    #     send_resolved: true

  - name: 'warning'
    # Slack example (uncomment and configure)
    # slack_configs:
    #   - api_url: '{{SLACK_WEBHOOK_URL}}'
    #     channel: '#alerts-warning'
    #     title: '🟡 WARNING: {{ .GroupLabels.alertname }}'
    #     text: '{{ range .Alerts }}{{ .Annotations.summary }}\n{{ end }}'
    #     send_resolved: true

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'service']
