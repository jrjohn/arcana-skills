id: ci-maintenance
version: '1.0'
specVersion: '0.8'
name: CI Maintenance
description: Automated CI maintenance flow (no human tasks) — runs end to end.
start: Scan
states:
  - name: Scan
    type: inject
    data:
      step: scan
    transition: Remediate
  - name: Remediate
    type: inject
    data:
      step: remediate
    transition: Verify
  - name: Verify
    type: inject
    data:
      step: verify
    end: true
