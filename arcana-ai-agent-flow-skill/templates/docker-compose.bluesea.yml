# Arcana AI Agent Flow — bluesea deployment overlay.
#
# Differences from the Mac compose:
#  - attaches to the EXISTING external `devops_default` network
#  - reuses the EXISTING bluesea Kafka (set KAFKA_BOOTSTRAP); no kafka service here
#  - uses pre-loaded images (built on Mac, docker save | scp | docker load)
#  - publishes nothing publicly except the dashboard on 127.0.0.1 (front it with Authelia)
#  - kogito-pg hosts three DBs: workflow (engine), dataindex (Data Index), arcana (read-API)
#
# Deploy assets to copy onto bluesea next to this file:
#   ./kogito-pg-init/        (01-dataindex-db.sql, 02-arcana-db.sql)
#   ./data-index-protobufs/  (BPMN + SWF .proto descriptors)
#   ./bpmn/                  (BPMN definitions for the read-API graph endpoint)
#
# Usage (bluesea, John `!`):
#   KAFKA_BOOTSTRAP=<existing-kafka:9092> DASHBOARD_PORT=8090 \
#     docker compose -f docker-compose.bluesea.yml up -d

services:
  kogito-pg:
    image: postgres:17-alpine
    container_name: aaf-kogito-pg
    environment:
      POSTGRES_USER: kogito
      POSTGRES_PASSWORD: ${PG_PASSWORD:-kogito}
      POSTGRES_DB: workflow
    volumes:
      - kogito-pgdata:/var/lib/postgresql/data
      - ./kogito-pg-init:/docker-entrypoint-initdb.d:ro   # creates dataindex + arcana on first init
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kogito -d workflow"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [devops_default]

  kogito-bpmn:
    image: arcana/kogito-bpmn:1.0.0
    container_name: aaf-kogito-bpmn
    depends_on:
      kogito-pg:
        condition: service_healthy
    environment:
      POSTGRES_USER: kogito
      POSTGRES_PASSWORD: ${PG_PASSWORD:-kogito}
      JDBC_URL: jdbc:postgresql://aaf-kogito-pg:5432/workflow
      KAFKA_BOOTSTRAP: ${KAFKA_BOOTSTRAP:-kafka:9092}
      KOGITO_SERVICE_URL: http://aaf-kogito-bpmn:8080
    networks: [devops_default]

  kogito-swf:
    image: arcana/kogito-swf:1.0.0
    container_name: aaf-kogito-swf
    environment:
      KAFKA_BOOTSTRAP: ${KAFKA_BOOTSTRAP:-kafka:9092}
      KOGITO_SERVICE_URL: http://aaf-kogito-swf:8080
    networks: [devops_default]

  data-index:
    image: docker.io/apache/incubator-kie-kogito-data-index-postgresql:10.0.x-20260329-linux-arm64
    container_name: aaf-data-index
    depends_on:
      kogito-pg:
        condition: service_healthy
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://aaf-kogito-pg:5432/dataindex
      QUARKUS_DATASOURCE_USERNAME: kogito
      QUARKUS_DATASOURCE_PASSWORD: ${PG_PASSWORD:-kogito}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP:-kafka:9092}
      QUARKUS_HTTP_CORS_ORIGINS: "/.*/"
      KOGITO_DATA_INDEX_PROPS: -Dquarkus.hibernate-orm.database.generation=update
    volumes:
      - ./data-index-protobufs:/home/kogito/data/protobufs:ro
    networks: [devops_default]

  arcana-cloud-rust:
    image: arcana/arcana-cloud-rust:1.0.0
    container_name: aaf-arcana-cloud-rust
    depends_on:
      kogito-pg:
        condition: service_healthy
    environment:
      ARCANA_ENVIRONMENT: production
      ARCANA__DATABASE__URL: postgres://kogito:${PG_PASSWORD:-kogito}@aaf-kogito-pg:5432/arcana
      ARCANA__REDIS__ENABLED: "false"
      ARCANA__SECURITY__GRPC_TLS_ENABLED: "false"   # internal network; no cert needed
      ARCANA__SECURITY__JWT_SECRET: ${JWT_SECRET:?set a 32+ char secret}
      DATA_INDEX_URL: http://aaf-data-index:8080
      BPMN_DIR: /app/bpmn
      SWF_DIR: /app/swf
    volumes:
      - ./bpmn:/app/bpmn:ro
      - ./swf:/app/swf:ro
    networks: [devops_default]

  dashboard:
    image: arcana/dashboard:1.0.0
    container_name: aaf-dashboard
    depends_on:
      - arcana-cloud-rust
    # nginx.conf proxies /api -> arcana-cloud-rust:8080; front with Authelia.
    ports:
      - "127.0.0.1:${DASHBOARD_PORT:-8090}:80"
    networks: [devops_default]

  task-worker:
    image: arcana/task-worker:1.0.0
    container_name: aaf-task-worker
    depends_on:
      - kogito-bpmn
      - data-index
    environment:
      MODE: ${WORKER_MODE:-real}
      ENGINE_URL: http://aaf-kogito-bpmn:8080
      DATA_INDEX_URL: http://aaf-data-index:8080
      POLL_SECS: "5"
      AGENT_TASK_URL: ${AGENT_TASK_URL:-http://agent-task-node:8090}
      JENKINS_URL: ${JENKINS_URL:-}
      JENKINS_USER: ${JENKINS_USER:-}
      JENKINS_TOKEN: ${JENKINS_TOKEN:-}
    networks: [devops_default]

  # Hourly heartbeat: start an automated ci-maintenance (SonataFlow) instance
  # every hour so the dashboard always shows recent automated workflow runs.
  # (The event-driven B2 Jenkins trigger handles real red builds separately.)
  ci-scheduler:
    image: curlimages/curl:latest
    container_name: aaf-ci-scheduler
    depends_on:
      - kogito-swf
    entrypoint: ["/bin/sh", "-c"]   # override curl entrypoint
    command:
      - |
        while true; do
          curl -s -X POST http://aaf-kogito-swf:8080/ci-maintenance -H "Content-Type: application/json" -d '{}' -o /dev/null -w "ci-maintenance %{http_code}\n"
          sleep ${SCHEDULE_SECS:-3600}
        done
    restart: unless-stopped
    networks: [devops_default]

volumes:
  kogito-pgdata:

networks:
  devops_default:
    external: true
