# Arcana Workflow Monitor — nginx config.
# Serves the Angular SPA and proxies /api to the read-API (single origin → no CORS).
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Read-only workflow API → arcana-cloud-rust (engine-agnostic read layer).
    # The read-API listens on 8080 inside its container. Resolve the upstream at
    # request time (Docker's embedded DNS) via a variable, so nginx still starts
    # if the read-API is briefly down/restarting instead of failing at boot.
    location /api/ {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $upstream http://arcana-cloud-rust:8080;
        # variable proxy_pass with no URI part → forward the full original
        # request URI (/api/v1/...), which is exactly what the read-API serves.
        proxy_pass $upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
