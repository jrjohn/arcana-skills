# Arcana AI Agent Flow — local (Mac-first) stack
# Phase A.2: kogito-pg + Kogito BPMN engine (PG persistence + Kafka events)
#            + Kafka (KRaft) + Kogito Data Index (queryable layer + GraphQL).
services:
  kogito-pg:
    image: postgres:17-alpine
    container_name: aaf-kogito-pg
    environment:
      POSTGRES_USER: kogito
      POSTGRES_PASSWORD: kogito
      POSTGRES_DB: workflow
    volumes:
      - kogito-pgdata:/var/lib/postgresql/data
      - ./kogito-pg-init:/docker-entrypoint-initdb.d:ro   # creates 'dataindex' DB on first init
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kogito -d workflow"]
      interval: 5s
      timeout: 3s
      retries: 20

  kafka:
    image: apache/kafka:3.9.1
    container_name: aaf-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://kafka:9092,CONTROLLER://kafka:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  kogito-bpmn:
    build:
      context: ./kogito-bpmn
      dockerfile: Dockerfile
    image: arcana/kogito-bpmn:1.0.0
    container_name: aaf-kogito-bpmn
    depends_on:
      kogito-pg:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      POSTGRES_USER: kogito
      POSTGRES_PASSWORD: kogito
      JDBC_URL: jdbc:postgresql://kogito-pg:5432/workflow
      KAFKA_BOOTSTRAP: kafka:9092
      KOGITO_SERVICE_URL: http://kogito-bpmn:8080
    ports:
      - "8081:8080"   # REST + /q/swagger-ui + /q/health

  # Automated (no-human) CNCF Serverless Workflows — feeds the SAME Data Index.
  kogito-swf:
    build:
      context: ./kogito-swf
      dockerfile: Dockerfile
    image: arcana/kogito-swf:1.0.0
    container_name: aaf-kogito-swf
    depends_on:
      kafka:
        condition: service_started
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      KOGITO_SERVICE_URL: http://kogito-swf:8080
    ports:
      - "8082:8080"   # REST + /q/swagger-ui + /q/health

  data-index:
    image: docker.io/apache/incubator-kie-kogito-data-index-postgresql:10.0.x-20260329-linux-arm64
    container_name: aaf-data-index
    depends_on:
      kogito-pg:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://kogito-pg:5432/dataindex
      QUARKUS_DATASOURCE_USERNAME: kogito
      QUARKUS_DATASOURCE_PASSWORD: kogito
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      QUARKUS_HTTP_CORS_ORIGINS: "/.*/"
      KOGITO_DATA_INDEX_PROPS: -Dquarkus.hibernate-orm.database.generation=update
    volumes:
      # both engines' protobuf descriptors (BPMN + SWF) collected into one dir
      - ./data-index-protobufs:/home/kogito/data/protobufs:ro
    ports:
      - "8180:8080"   # GraphQL at /graphql, GraphiQL UI at /graphiql

volumes:
  kogito-pgdata:
