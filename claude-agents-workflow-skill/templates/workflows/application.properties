# === CI build-completed event ingestion via KAFKA (durable, replayable) ===
# Switched from quarkus-http to smallrye-kafka so events survive sf-ci restarts
# and the full event stream is retained (30d) for problem-tracking / replay.
mp.messaging.incoming.ci_build_completed.connector=smallrye-kafka
mp.messaging.incoming.ci_build_completed.topic=ci.build.completed
mp.messaging.incoming.ci_build_completed.group.id=sf-ci-maintenance
mp.messaging.incoming.ci_build_completed.auto.offset.reset=earliest
mp.messaging.incoming.ci_build_completed.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.ci_build_completed.cloud-events=true

# === periodic sweep tick (ce-kafka-bridge heartbeat -> ci-sweep workflow) ===
mp.messaging.incoming.ci_sweep_requested.connector=smallrye-kafka
mp.messaging.incoming.ci_sweep_requested.topic=ci.sweep.requested
mp.messaging.incoming.ci_sweep_requested.group.id=sf-ci-maintenance
mp.messaging.incoming.ci_sweep_requested.auto.offset.reset=latest
mp.messaging.incoming.ci_sweep_requested.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.ci_sweep_requested.cloud-events=true
kafka.bootstrap.servers=kafka:9092

# Generated OpenAPI rest-client for agentnode.json -> configKey "agentnode_json".
# claude -p tasks take minutes -> long read timeout so the workflow waits.
quarkus.rest-client.agentnode_json.read-timeout=900000
quarkus.rest-client.agentnode_json.connect-timeout=5000
quarkus.http.port=8080
